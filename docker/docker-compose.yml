version: "3.8"

# ============================================================
# AI Support Ticket Triage & Routing System
# Docker Compose - Local Development Stack
# ============================================================

services:

  # ----------------------------------------------------------
  # n8n — Workflow Automation Engine
  # ----------------------------------------------------------
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_triage
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Core
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}

      # Auth (basic auth for local dev)
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}

      # PostgreSQL for n8n internal data
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${N8N_DB_NAME:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8npassword}

      # Execution
      - EXECUTIONS_PROCESS=main
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true
      - EXECUTIONS_DATA_MAX_AGE=336        # 14 days

      # Timezone
      - GENERIC_TIMEZONE=${TIMEZONE:-UTC}

      # Credentials encryption key (generate your own)
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-please-change-this-key-in-production}

      # Enable community nodes
      - N8N_COMMUNITY_PACKAGES_ENABLED=true

      # Groq (passed as env for HTTP node reference)
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_API_URL=https://api.groq.com/openai/v1/chat/completions

      # App-level PostgreSQL (tickets DB)
      - TICKETS_DB_HOST=postgres
      - TICKETS_DB_PORT=5432
      - TICKETS_DB_NAME=${TICKETS_DB_NAME:-support_tickets}
      - TICKETS_DB_USER=${POSTGRES_USER:-n8n}
      - TICKETS_DB_PASSWORD=${POSTGRES_PASSWORD:-n8npassword}

    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - triage_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------
  # PostgreSQL — Primary Data Store
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres_triage
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-n8n}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-n8npassword}
      - POSTGRES_MULTIPLE_DATABASES=${N8N_DB_NAME:-n8n},${TICKETS_DB_NAME:-support_tickets}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/01-init-multiple-dbs.sh
      - ./db/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql
    networks:
      - triage_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ----------------------------------------------------------
  # Redis — Queue Simulation (optional but recommended)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis_triage
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispassword}
    volumes:
      - redis_data:/data
    networks:
      - triage_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # pgAdmin — Database UI (optional, dev only)
  # ----------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_triage
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@triage.local}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-pgadminpassword}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - triage_net
    profiles:
      - dev          # only starts with: docker compose --profile dev up

# ----------------------------------------------------------
# Volumes
# ----------------------------------------------------------
volumes:
  n8n_data:
  postgres_data:
  redis_data:
  pgadmin_data:

# ----------------------------------------------------------
# Networks
# ----------------------------------------------------------
networks:
  triage_net:
    driver: bridge
